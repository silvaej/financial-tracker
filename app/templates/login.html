<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Log in — Finance Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap"
          rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', path='css/style.css') }}">
  </head>
  <body class="font-sans text-ink bg-ink">
    <div class="flex h-screen items-center justify-center">
      <div class="card w-full max-w-sm mx-4">
        <div class="page-title mb-4">Ledger</div>
        {% if error %}<p class="text-sm text-rust mb-4">{{ error }}</p>{% endif %}
        <form method="post" action="/login" class="flex flex-col gap-3">
          <input class="field"
                 type="email"
                 name="email"
                 placeholder="Email"
                 required
                 autofocus>
          <input class="field"
                 type="password"
                 name="password"
                 placeholder="Password"
                 required>
          <button type="submit" class="add-btn mt-2">Log in</button>
        </form>
      </div>
    </div>
  </body>
</html>
